name: Name Bug report
description: Description Submit a bug report
body:
  - type: markdown
    attributes:
      value: |
        - Please provide the output of the console command `backintime --diagnostics`, to help us diagnose the problem quickly.
        - Please specify as precisely as you can the package or installation source where you got _Back In Time_ from. Sometimes there are multiple alternatives, like in [Arch-based distros](https://aur.archlinux.org/packages?K=backintime).
        - As an **alternative** fell free to use our [mailing list](https://mail.python.org/mailman3/lists/bit-dev.python.org) for every topic about _Back In Time_.
  - type: textarea
    attributes:
      label: "LAbEL? Bug description:"
      description: >
        Give a clear and concise description of what happened.
        Include a [minimal, reproducible example](https://stackoverflow.com/help/minimal-reproducible-example) if possible.
        [Copy and paste code where possible rather than using screenshots](https://meta.stackoverflow.com/a/285557/13990016),
        and put any code blocks inside triple backticks.
      value: |
        ```python
        # Add a code block here, if required
        ```
